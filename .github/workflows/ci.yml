name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: web

jobs:
  lint-typecheck-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"

      - name: Lint
        run: npm run lint

      - name: Generate Next.js types
        run: npx next typegen

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Minimal env so Next.js build succeeds without real services
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          NEXTAUTH_SECRET: "ci-secret-not-used-at-build-time"
          NEXTAUTH_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"
          ANTHROPIC_API_KEY: "placeholder"
          EMAIL_SERVER_HOST: "localhost"
          EMAIL_SERVER_PORT: "587"
          EMAIL_SERVER_USER: "test"
          EMAIL_SERVER_PASSWORD: "test"
          EMAIL_FROM: "test@example.com"

  e2e:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: lint-typecheck-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: manager_ai_coach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/manager_ai_coach_test"
      NEXTAUTH_SECRET: "ci-e2e-secret"
      NEXTAUTH_URL: "http://localhost:3000"
      GOOGLE_CLIENT_ID: "placeholder"
      GOOGLE_CLIENT_SECRET: "placeholder"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EMAIL_SERVER_HOST: "localhost"
      EMAIL_SERVER_PORT: "587"
      EMAIL_SERVER_USER: "test"
      EMAIL_SERVER_PASSWORD: "test"
      EMAIL_FROM: "test@example.com"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push DB schema
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npm run db:seed

      - name: Start app
        run: npm run build && npm run start &
        env:
          PORT: 3000

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E smoke tests
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
